<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated skill cloud">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1200" y2="330">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="330" rx="22" fill="url(#card)"/>
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">TECH STACK</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">
    <g>
      <rect x="98" y="90" width="128" height="44" rx="12" fill="#E34F26"/><text x="162" y="118" text-anchor="middle" fill="white">HTML5</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="3s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="248" y="90" width="116" height="44" rx="12" fill="#1572B6"/><text x="306" y="118" text-anchor="middle" fill="white">CSS3</text>
      <animateTransform attributeName="transform" type="translate" values="0 -6;0 4;0 -6" dur="3.3s" repeatCount="indefinite"/>
    </g>
    <g>

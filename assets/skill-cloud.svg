      <animateTransform attributeName="transform" type="translate" values="0 -4;0 6;0 -4" dur="3.9s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="430" y="166" width="112" height="44" rx="12" fill="#013243"/><text x="486" y="194" text-anchor="middle" fill="white">NumPy</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="3.6s" repeatCount="indefinite"/>

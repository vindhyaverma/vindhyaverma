<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vindhya Verma animated GitHub profile banner</title>
  <desc id="desc">An animated premium banner for Vindhya Verma with finance, AI, and Web3 visual elements.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06121F"/>
      <stop offset="0.42" stop-color="#102A43"/>
      <stop offset="0.72" stop-color="#3A0CA3"/>
      <stop offset="1" stop-color="#FF4D6D"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 600 210" to="360 600 210" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="stroke" x1="80" y1="70" x2="1120" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#FDE047"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#sky)"/>
  <g opacity="0.25">
    <circle cx="155" cy="94" r="78" fill="#38BDF8">
      <animate attributeName="cy" values="94;120;94" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="118" r="96" fill="#FDE047">
      <animate attributeName="cx" values="1030;990;1030" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="326" r="116" fill="#FB7185">
      <animate attributeName="r" values="96;132;96" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.34">
    <path d="M0 316C149 246 286 248 420 300C567 357 711 352 852 272C970 205 1077 192 1200 225V420H0V316Z" fill="#020617"/>
    <path d="M73 116C211 56 371 59 520 133C681 214 808 211 964 124C1052 75 1121 73 1200 94" stroke="url(#stroke)" stroke-width="5" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="60 900;260 700;60 900" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-500;-1000" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M84 302C242 230 376 238 526 292C681 348 778 329 930 246C1041 186 1125 176 1200 190" stroke="#4ADE80" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="20 600;180 480;20 600" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-380;-760" dur="10s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="68" width="1036" height="284" rx="28" fill="#050B16" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="108" y="96" width="180" height="14" rx="7" fill="#4ADE80">
      <animate attributeName="width" values="130;220;130" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="108" y="124" width="110" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.26"/>
    <rect x="108" y="145" width="170" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.16"/>
    <rect x="108" y="166" width="138" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.16"/>

    <text x="600" y="172" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="0">VINDHYA VERMA</text>
    <text x="600" y="221" text-anchor="middle" fill="#CFFAFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="0">IITJ'29 | Google Student Ambassador | GSSoC'26</text>
    <text x="600" y="260" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="0">AI + Data Science + Finance + Web3 + Crypto + Market Analytics</text>
    <text x="600" y="300" text-anchor="middle" fill="#FDE68A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0">Building intelligent things. Presenting them beautifully.</text>

    <g transform="translate(920 106)">
      <rect width="150" height="156" rx="18" fill="#0B1220" stroke="#38BDF8" stroke-opacity="0.55"/>
      <polyline points="20,108 44,82 66,94 92,48 124,62" fill="none" stroke="#4ADE80" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="points" values="20,108 44,82 66,94 92,48 124,62;20,96 44,102 66,70 92,76 124,34;20,108 44,82 66,94 92,48 124,62" dur="3s" repeatCount="indefinite"/>
      </polyline>
      <text x="20" y="136" fill="#E2E8F0" font-family="Consolas, Menlo, monospace" font-size="15">market.ai</text>
    </g>
  </g>

  <g fill="#FFFFFF" opacity="0.7">
    <circle cx="340" cy="70" r="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="58" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1056" cy="316" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="196" cy="322" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
  </g>
</svg>
